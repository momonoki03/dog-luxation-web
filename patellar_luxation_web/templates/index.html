<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개체 맞춤형 슬개골 탈구 조기 탐지 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background-color: #f1f5f9; color: #334155; }
        .container { max-width: 750px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 25px; }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        h2 { color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 0; }
        .step-tag { background: #3b82f6; color: white; padding: 3px 8px; border-radius: 4px; font-size: 14px; margin-right: 5px; vertical-align: middle; }
        .step-tag.step2 { background: #10b981; }
        .form-group { margin-top: 15px; }
        .btn-group { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #e2e8f0; }
        .dog-section { margin-bottom: 10px; }
        .dog-label { font-weight: bold; display: inline-block; width: 90px; color: #475569; }
        .btn-preset { background: #64748b; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; margin-right: 5px; font-size: 13px; }
        .btn-preset:hover { background: #475569; }
        .btn-normal { background: #3b82f6; }
        .btn-normal:hover { background: #2563eb; }
        .btn-stage1 { background: #d97706; }
        .btn-stage1:hover { background: #b45309; }
        .btn-stage2 { background: #dc2626; }
        .btn-stage2:hover { background: #b91c1c; }
        button[type="submit"] { padding: 8px 16px; background: #475569; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .danger { background-color: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .warning { background-color: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        .safe { background-color: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .info-msg { background: #eff6ff; color: #1e40af; padding: 15px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #3b82f6; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 맞춤형 슬개골 탈구 조기 탐지 시스템</h1>
        
        <div class="card">
            <h2><span class="step-tag">1단계</span> 반려견 평소 걸음 등록 (기준점 설정)</h2>
            <p>시연할 강아지의 평소 정상 걸음 데이터를 선택하여 고유한 걸음 성향을 먼저 등록합니다.</p>
            <form id="calibrateForm" class="form-group">
                <input type="file" id="calibFile" accept=".csv">
                <button type="submit">외부 파일 업로드</button>
                
                <div class="btn-group">
                    <div class="dog-section">
                        <span class="dog-label">🐶 16호견 :</span>
                        <button type="button" class="btn-preset btn-normal" onclick="runCalibratePreset('16')">16호 평소 걸음 등록</button>
                    </div>
                    <div class="dog-section">
                        <span class="dog-label">🐶 18호견 :</span>
                        <button type="button" class="btn-preset btn-normal" onclick="runCalibratePreset('18')">18호 평소 걸음 등록</button>
                    </div>
                </div>
            </form>
            <div id="calibResult" class="info-msg" style="display:none;"></div>
        </div>

        <div class="card">
            <h2><span class="step-tag step2">2단계</span> 현재 걸음걸이 분석</h2>
            <p>분석하고자 하는 시나리오 데이터를 선택하여 평소 걸음 대비 변화를 확인합니다.</p>
            <form id="analyzeForm" class="form-group">
                <input type="file" id="testFile" accept=".csv">
                <button type="submit">외부 파일 분석</button>
                
                <div class="btn-group">
                    <div class="dog-section">
                        <span class="dog-label">🐶 16호견 :</span>
                        <button type="button" class="btn-preset" onclick="runAnalyzePreset('16_정상')">정상 상태</button>
                        <button type="button" class="btn-preset btn-stage1" onclick="runAnalyzePreset('16_1기')">탈구 1기 시연</button>
                        <button type="button" class="btn-preset btn-stage2" onclick="runAnalyzePreset('16_2기')">탈구 2기 시연</button>
                    </div>
                    <div class="dog-section">
                        <span class="dog-label">🐶 18호견 :</span>
                        <button type="button" class="btn-preset" onclick="runAnalyzePreset('18_정상')">정상 상태</button>
                        <button type="button" class="btn-preset btn-stage1" onclick="runAnalyzePreset('18_1기')">탈구 1기 시연</button>
                        <button type="button" class="btn-preset btn-stage2" onclick="runAnalyzePreset('18_2기')">탈구 2기 시연</button>
                    </div>
                </div>
            </form>

            <div id="result-box" class="result-box">
                <h3 id="status-title" style="margin-top:0; font-size: 22px;"></h3>
                <p>📊 <strong>등록된 평소 걸음 점수:</strong> <span id="base-score"></span>%</p>
                <p>📈 <strong>현재 측정된 보행 점수:</strong> <span id="current-score"></span>%</p>
                <p>⚠️ <strong>평소 대비 이상 징후 증가량:</strong> <span id="relative-score" style="font-weight:bold; font-size:18px;"></span>%</p>
                <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 15px 0;">
                <p>📋 <strong>분석 소견:</strong> <span id="message-text"></span></p>
            </div>
        </div>
    </div>

    <script>
        // 1단계 파일 업로드
        document.getElementById('calibrateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('calibFile');
            if(!fileInput.files[0]) { alert("파일을 선택해주세요."); return; }
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            sendCalibrate(formData);
        });

        // 1단계 버튼 클릭
        async function runCalibratePreset(dogNum) {
            const formData = new FormData();
            formData.append("preset", dogNum);
            sendCalibrate(formData);
        }

        async function sendCalibrate(formData) {
            try {
                const response = await fetch('/calibrate', { method: 'POST', body: formData });
                const data = await response.json();
                const calibResult = document.getElementById('calibResult');
                if (response.ok) {
                    calibResult.style.display = 'block';
                    calibResult.innerHTML = `✅ <strong>등록 성공!</strong><br>해당 반려견의 평소 걸음 성향 점수가 <strong>${data.baseline_score}%</strong>로 기억되었습니다. 이제 2단계 분석 버튼을 눌러보세요.`;
                } else { alert(data.error); }
            } catch (error) { alert("통신 중 오류가 발생했습니다."); }
        }

        // 2단계 파일 업로드
        document.getElementById('analyzeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('testFile');
            if(!fileInput.files[0]) { alert("파일을 선택해주세요."); return; }
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            sendAnalyze(formData);
        });

        // 2단계 버튼 클릭
        async function runAnalyzePreset(presetName) {
            const formData = new FormData();
            formData.append("preset", presetName);
            sendAnalyze(formData);
        }

        async function sendAnalyze(formData) {
            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) { alert(data.error); return; }

                const resultBox = document.getElementById('result-box');
                resultBox.style.display = 'block';
                resultBox.className = 'result-box';

                if (data.status.includes('위험')) resultBox.classList.add('danger');
                else if (data.status.includes('주의')) resultBox.classList.add('warning');
                else resultBox.classList.add('safe');

                document.getElementById('status-title').innerText = data.status;
                document.getElementById('base-score').innerText = data.baseline_score;
                document.getElementById('current-score').innerText = data.current_score;
                document.getElementById('relative-score').innerText = data.relative_score;
                document.getElementById('message-text').innerText = data.message;
            } catch (error) { alert("통신 중 오류가 발생했습니다."); }
        }
    </script>
</body>
</html>
